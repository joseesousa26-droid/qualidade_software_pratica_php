name: PHP Tests

on: [push, pull_request]

jobs:
     build:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v3

         - name: Setup PHP
           uses: shivammathur/setup-php@v2
           with:
             php-version: '8.1'

         - name: Install dependencies
           run: composer install --prefer-dist --no-progress --no-suggest

         - name: Run PHPUnit
           run: vendor/bin/phpunit